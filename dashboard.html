<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>類題演習 先生用ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F0EEE6;      /* Claude風アイボリー背景 */
  --ink:#1F1E1D;        /* 温かみのある墨色 */
  --teal:#C6613F;       /* メインアクセント：テラコッタ */
  --teal-deep:#3D3929;  /* 濃色：ウォームダークスレート */
  --clay:#D97757;       /* 明るいテラコッタ（バッジ） */
  --gold:#A98A47;       /* 落ち着いたゴールド */
  --line:#E2DCCE;       /* 温かみのある罫線 */
  --card:#FAF9F5;       /* カード背景（生成り白） */
  --danger:#B5483D;
  --good:#5E7C4E;
  --warn:#B07818;
  --muted:#6E6A5E;
  --muted2:#94907F;
  --soft:#E9E4D6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Noto Sans JP',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app{max-width:900px;margin:0 auto;padding:26px 16px 80px;}
h1,h2,h3{font-family:'Noto Serif JP',serif;}

/* ヘッダー */
header{
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
  margin-bottom:28px;
  display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;
}
header h1{font-size:23px;color:var(--ink);}
header .badge{font-size:12px;color:#fff;background:var(--clay);padding:5px 14px;border-radius:999px;font-weight:700;}
.updated{font-size:12px;color:var(--muted);margin-top:5px;}

/* セクション */
.section{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  box-shadow:0 1px 3px rgba(63,57,41,.05);
  margin-bottom:24px;
  padding:24px 22px;
}
.section h2{
  font-size:16px;color:var(--ink);
  margin-bottom:18px;padding-bottom:10px;
  border-bottom:1px solid var(--line);
  font-weight:600;
}
.section-label{
  display:inline-block;
  font-size:11px;letter-spacing:.06em;font-weight:700;
  background:var(--teal);color:#fff;
  padding:3px 11px;border-radius:999px;margin-right:9px;
  font-family:'Noto Sans JP',sans-serif;
  vertical-align:2px;
}

/* テーブル共通 */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  background:transparent;color:var(--muted);
  padding:8px 10px;text-align:left;font-weight:700;font-size:11.5px;
  letter-spacing:.04em;border-bottom:2px solid #D8D2C2;
}
td{padding:9px 10px;border-bottom:1px solid #ECE7DA;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#F3EFE3;}
.rank-num{
  font-family:'Noto Serif JP',serif;
  font-size:16px;font-weight:700;color:var(--teal);
  width:32px;text-align:center;
}
.rank-num.gold{color:#A07B10;}
.rank-num.silver{color:#8A867B;}
.rank-num.bronze{color:#8B5C2A;}

/* バー */
.bar-wrap{display:flex;align-items:center;gap:8px;}
.bar-track{flex:1;height:10px;background:var(--soft);border-radius:999px;overflow:hidden;min-width:60px;}
.bar-fill{height:100%;background:var(--teal);border-radius:999px;transition:.3s;}
.bar-fill.warn{background:#D29B3C;}
.bar-fill.danger{background:var(--danger);}
.bar-pct{font-size:12px;font-weight:700;color:var(--ink);min-width:36px;text-align:right;}

/* 生徒テーブル */
.student-low td{background:#F8EFDC;}
.student-low td:first-child::after{
  content:'要確認';font-size:10px;color:var(--warn);font-weight:700;
  display:block;margin-top:1px;
}
.badge-pct{
  display:inline-block;font-size:12px;font-weight:700;
  padding:2px 10px;border-radius:999px;
}
.badge-pct.good{background:#E2EAD7;color:#40602F;}
.badge-pct.mid{background:#F5E9C9;color:#7C5A16;}
.badge-pct.low{background:#F6DFD4;color:#8E3A28;}

/* ヒートマップ */
.heatmap-wrap{overflow-x:auto;}
.heatmap{border-collapse:collapse;font-size:12px;}
.heatmap th{background:#EFEBE0;color:#57534A;padding:8px 12px;font-weight:700;white-space:nowrap;border:2px solid var(--card);border-radius:0;}
.heatmap td{
  padding:10px 14px;text-align:center;
  border:2px solid var(--card);font-weight:700;font-size:13px;
  white-space:nowrap;min-width:80px;
}
.heatmap td.no-data{color:#B4AF9F;background:#F1EDE2;font-weight:400;font-size:11px;}
.heatmap tr th:first-child{text-align:left;min-width:140px;}
.heatmap tr:hover td{background:transparent;}
.heatmap tr:hover td.no-data{background:#F1EDE2;}

/* ローディング・エラー */
.loading{text-align:center;padding:40px;color:var(--teal);font-weight:700;}
.error-box{
  background:#F6DFD4;border:1px solid var(--danger);border-radius:12px;
  padding:14px 16px;color:#8E3A28;font-size:13px;line-height:1.6;
}
.empty{color:var(--muted2);font-size:13px;padding:12px 0;text-align:center;}

/* 概況カード */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px;}
.kpi{
  flex:1;min-width:120px;
  background:#F4F1E8;border:1px solid var(--line);border-radius:14px;
  padding:16px;text-align:center;
}
.kpi .val{font-family:'Noto Serif JP',serif;font-size:30px;color:var(--teal);font-weight:700;}
.kpi .lbl{font-size:11px;color:var(--muted);margin-top:3px;}

/* 更新ボタン */
.reload-btn{
  display:inline-block;background:var(--teal);color:#fff;
  border:none;border-radius:999px;padding:10px 24px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:16px;transition:.15s;
}
.reload-btn:hover{background:#B0532F;}

/* ---- みんなのメモ 承認キュー ---- */
.pending-badge{display:inline-block;background:var(--danger);color:#fff;font-size:12px;font-weight:700;border-radius:999px;padding:2px 10px;margin-left:8px;vertical-align:2px;}
.mod-card{border:1px solid var(--line);border-radius:14px;background:#fff;padding:16px;margin-bottom:14px;}
.mod-card.reported{border-color:var(--danger);background:#FDF6F3;}
.mod-q{font-size:13px;line-height:1.7;color:var(--ink);background:#F4F1E8;border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.mod-q .qid{font-family:'Noto Serif JP',serif;font-weight:700;color:var(--teal);font-size:12.5px;margin-right:8px;}
.mod-q .ans{color:var(--good);font-weight:700;}
.mod-expl{margin-top:8px;}
.mod-expl summary{cursor:pointer;font-size:12px;font-weight:700;color:#4C6640;user-select:none;}
.mod-expl .expl-body{font-size:12.5px;line-height:1.8;color:var(--ink);white-space:pre-wrap;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:6px;}
.mod-note-head{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
.mod-lang{background:var(--clay);color:#fff;font-size:11px;font-weight:700;border-radius:999px;padding:2px 10px;}
.mod-type{background:var(--soft);color:#57534A;font-size:11px;border-radius:999px;padding:2px 10px;}
.mod-who{font-size:12px;color:var(--muted);}
.mod-report-flag{background:var(--danger);color:#fff;font-size:11px;font-weight:700;border-radius:999px;padding:2px 10px;}
.mod-body{font-size:14px;line-height:1.8;white-space:pre-wrap;word-break:break-word;border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.mod-ja{font-size:13px;line-height:1.7;color:var(--ink);background:#EDF2E4;border-radius:10px;padding:9px 12px;margin-top:7px;white-space:pre-wrap;word-break:break-word;}
.mod-ja .lbl{font-size:10.5px;font-weight:700;color:#4C6640;display:block;margin-bottom:2px;}
.mod-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center;}
.mod-btn{border:none;border-radius:999px;padding:8px 18px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
.mod-btn:disabled{opacity:.5;cursor:not-allowed;}
.mod-btn.approve{background:var(--good);color:#fff;}
.mod-btn.edit{background:#fff;color:var(--ink);border:1.5px solid var(--teal-deep);}
.mod-btn.reject{background:#fff;color:var(--danger);border:1.5px solid var(--danger);}
.mod-btn.unpublish{background:#fff;color:var(--warn);border:1.5px solid var(--warn);font-size:11.5px;padding:5px 12px;}
.mod-edit-area,.mod-reject-area{display:none;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;}
.mod-edit-area textarea{width:100%;min-height:70px;font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;resize:vertical;}
.mod-reject-area select{font-family:inherit;font-size:12.5px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;max-width:100%;}
.mod-msg{font-size:12px;color:var(--danger);margin-top:6px;}
.key-box{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.key-box input{font-family:inherit;font-size:13px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;flex:1;min-width:200px;}
.approved-note-ja{font-size:11.5px;color:var(--muted);margin-top:2px;}
.mini-link{border:none;background:none;color:var(--muted2);font-size:11px;cursor:pointer;text-decoration:underline;font-family:inherit;padding:0;}
</style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <h1>類題演習 先生用ダッシュボード</h1>
      <div class="updated" id="updatedAt"></div>
    </div>
    <span class="badge">教員専用</span>
  </header>

  <div id="notesAdminArea">
    <div class="loading">みんなのメモを読み込み中…</div>
  </div>

  <div id="mainContent">
    <div class="loading">データを読み込み中…</div>
  </div>

</div>

<script>
// ===== ★ここを自分のGAS URLに書き換えてください =====
// 【2026-07-14】生徒用index.htmlと同じURLに統一（旧URLは別デプロイのため、みんなのメモ機能が動かない）
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwXCOsEuVsxbvGQPJSp61mYuX8xWFN95rfrXt5HhOr_BHxx-aPwWVRHNh27bClpJDk5iA/exec';
// =====================================================

const DIFF_LABEL = {1:'★ 基本', 2:'◎ 標準', 3:'× 応用'};
const DIFF_KEYS = [1, 2, 3];

async function loadAll(){
  const res = await fetch(`${GAS_API_URL}?type=allHistory`);
  const data = await res.json();
  if(!data.ok) throw new Error(data.error || '取得失敗');
  return data.history;
}

function renderAll(history){
  const now = new Date();
  document.getElementById('updatedAt').textContent =
    `最終更新：${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  // 生徒ごとに集約
  const students = {};
  history.forEach(h => {
    const sid = h.studentId;
    if(!students[sid]) students[sid] = { sessions:[], lastDate: null };
    students[sid].sessions.push(h);
    const d = new Date(h.date);
    if(!students[sid].lastDate || d > students[sid].lastDate) students[sid].lastDate = d;
  });

  const studentList = Object.entries(students).map(([id, s]) => {
    const totalQ = s.sessions.reduce((a,h)=>a+h.total,0);
    const totalC = s.sessions.reduce((a,h)=>a+h.correct,0);
    return { id, sessions: s.sessions.length, total: totalQ, correct: totalC, lastDate: s.lastDate };
  }).sort((a,b) => b.sessions - a.sessions);

  const totalSessions = history.length;
  const totalStudents = studentList.length;
  const avgPct = history.length
    ? Math.round(history.reduce((a,h)=> a + (h.total ? h.correct/h.total : 0), 0) / history.length * 100)
    : 0;

  // キーワード集計
  const kwWrong = {};
  const kwWrongStudents = {};
  history.forEach(h => {
    const sid = h.studentId;
    (h.wrongKeywords || []).forEach(k => {
      kwWrong[k] = (kwWrong[k] || 0) + 1;
      if(!kwWrongStudents[k]) kwWrongStudents[k] = new Set();
      kwWrongStudents[k].add(sid);
    });
  });
  const kwRanked = Object.keys(kwWrong).sort((a,b)=>kwWrong[b]-kwWrong[a]).slice(0,20);

  // 科目集計
  const subjAgg = {};
  history.forEach(h => {
    Object.keys(h.bySubject||{}).forEach(s => {
      subjAgg[s] = subjAgg[s] || {c:0,t:0};
      subjAgg[s].c += h.bySubject[s].c;
      subjAgg[s].t += h.bySubject[s].t;
    });
  });

  // 科目×難易度ヒートマップ集計
  const heatAgg = {}; // key: "科目|難易度" -> {c,t}
  history.forEach(h => {
    Object.keys(h.bySubjectDiff||{}).forEach(key => {
      heatAgg[key] = heatAgg[key] || {c:0,t:0};
      heatAgg[key].c += h.bySubjectDiff[key].c;
      heatAgg[key].t += h.bySubjectDiff[key].t;
    });
  });
  const heatSubjects = Object.keys(subjAgg).sort((a,b)=>subjAgg[b].t - subjAgg[a].t);

  // ===== 描画 =====
  document.getElementById('mainContent').innerHTML = `

    <!-- 概況 -->
    <div class="section">
      <h2><span class="section-label">概況</span>クラス全体</h2>
      <div class="kpi-row">
        <div class="kpi"><div class="val">${totalStudents}</div><div class="lbl">利用生徒数</div></div>
        <div class="kpi"><div class="val">${totalSessions}</div><div class="lbl">総演習回数</div></div>
        <div class="kpi"><div class="val">${avgPct}%</div><div class="lbl">クラス平均正答率</div></div>
      </div>
    </div>

    <!-- キーワード別誤答ランキング -->
    <div class="section">
      <h2><span class="section-label">誤答</span>キーワード別 誤答ランキング TOP20</h2>
      ${kwRanked.length === 0
        ? '<div class="empty">まだデータがありません</div>'
        : `<table>
            <thead><tr>
              <th style="width:40px">順位</th>
              <th>キーワード</th>
              <th style="width:120px">誤答回数</th>
              <th style="width:120px">間違えた生徒数</th>
            </tr></thead>
            <tbody>
              ${kwRanked.map((k,i) => {
                const cnt = kwWrong[k];
                const maxCnt = kwWrong[kwRanked[0]];
                const pct = Math.round(cnt/maxCnt*100);
                const students = kwWrongStudents[k].size;
                const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
                return `<tr>
                  <td><div class="rank-num ${rankClass}">${i+1}</div></td>
                  <td>${k}</td>
                  <td>
                    <div class="bar-wrap">
                      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                      <div class="bar-pct">${cnt}回</div>
                    </div>
                  </td>
                  <td style="font-weight:700;color:var(--teal)">${students}人</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`
      }
    </div>

    <!-- 生徒別利用状況 -->
    <div class="section">
      <h2><span class="section-label">生徒</span>生徒別 利用状況</h2>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">演習回数が2回以下の生徒は<span style="color:var(--warn);font-weight:700;">要確認</span>として表示しています。</p>
      ${studentList.length === 0
        ? '<div class="empty">まだデータがありません</div>'
        : `<table>
            <thead><tr>
              <th>記録名</th>
              <th style="width:80px;text-align:center">演習回数</th>
              <th style="width:80px;text-align:center">解答問題数</th>
              <th style="width:160px">全体正答率</th>
              <th style="width:110px">最終利用日</th>
            </tr></thead>
            <tbody>
              ${studentList.map(s => {
                const pct = s.total ? Math.round(s.correct/s.total*100) : 0;
                const pctClass = pct >= 70 ? 'good' : pct >= 50 ? 'mid' : 'low';
                const barClass = pct >= 70 ? '' : pct >= 50 ? 'warn' : 'danger';
                const lastD = s.lastDate;
                const lastStr = lastD
                  ? `${lastD.getMonth()+1}/${lastD.getDate()}`
                  : '—';
                const isLow = s.sessions <= 2;
                return `<tr class="${isLow?'student-low':''}">
                  <td>${s.id}</td>
                  <td style="text-align:center;font-weight:700">${s.sessions}回</td>
                  <td style="text-align:center">${s.total}問</td>
                  <td>
                    <div class="bar-wrap">
                      <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>
                      <span class="badge-pct ${pctClass}">${pct}%</span>
                    </div>
                  </td>
                  <td style="color:var(--muted);font-size:12px">${lastStr}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`
      }
    </div>

    <!-- 科目別クラス平均正答率 -->
    <div class="section">
      <h2><span class="section-label">科目</span>科目別 クラス平均正答率</h2>
      ${Object.keys(subjAgg).length === 0
        ? '<div class="empty">まだデータがありません</div>'
        : Object.keys(subjAgg).sort((a,b)=>subjAgg[b].t-subjAgg[a].t).map(s => {
            const {c,t} = subjAgg[s];
            const pct = t ? Math.round(c/t*100) : 0;
            const barClass = pct >= 70 ? '' : pct >= 50 ? 'warn' : 'danger';
            return `<div style="margin-bottom:10px;">
              <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
                <span>${s}</span><span style="color:var(--muted);font-size:12px">${t}問</span>
              </div>
              <div class="bar-wrap">
                <div class="bar-track" style="height:14px">
                  <div class="bar-fill ${barClass}" style="width:${pct}%;height:100%"></div>
                </div>
                <div class="bar-pct" style="font-size:14px">${pct}%</div>
              </div>
            </div>`;
          }).join('')
      }
    </div>

    <!-- 科目×難易度ヒートマップ -->
    <div class="section">
      <h2><span class="section-label">ヒートマップ</span>科目 × 難易度 正答率</h2>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">
        ★基本：難易度1 / ◎標準：難易度2 / ×応用：難易度3　（色：<span style="color:var(--good);font-weight:700;">■</span> 70%以上 / <span style="color:var(--warn);font-weight:700;">■</span> 50〜69% / <span style="color:var(--danger);font-weight:700;">■</span> 50%未満）
      </p>
      ${heatSubjects.length === 0
        ? '<div class="empty">まだデータがありません</div>'
        : `<div class="heatmap-wrap">
            <table class="heatmap">
              <thead><tr>
                <th>科目</th>
                ${DIFF_KEYS.map(d=>`<th>${DIFF_LABEL[d]}</th>`).join('')}
              </tr></thead>
              <tbody>
                ${heatSubjects.map(subj => {
                  return `<tr>
                    <th style="font-weight:700;background:#EFEBE0;color:var(--ink);text-align:left;">${subj}</th>
                    ${DIFF_KEYS.map(d => {
                      const key = `${subj}|${d}`;
                      const agg = heatAgg[key];
                      if(!agg || agg.t === 0) return `<td class="no-data">—</td>`;
                      const pct = Math.round(agg.c/agg.t*100);
                      const bg = pct >= 70 ? '#E2EAD7' : pct >= 50 ? '#F5E9C9' : '#F6DFD4';
                      const col = pct >= 70 ? '#40602F' : pct >= 50 ? '#7C5A16' : '#8E3A28';
                      return `<td style="background:${bg};color:${col};">${pct}%<br><span style="font-size:10px;font-weight:400;">${agg.t}問</span></td>`;
                    }).join('')}
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>`
      }
    </div>

    <div style="text-align:center">
      <button class="reload-btn" onclick="init()">データを更新する</button>
    </div>
  `;
}

async function init(){
  document.getElementById('mainContent').innerHTML = '<div class="loading">データを読み込み中…</div>';
  try{
    if(!GAS_API_URL || GAS_API_URL.indexOf('script.google.com') === -1){
      throw new Error('GAS_API_URLが設定されていません。dashboard.htmlの先頭にあるGAS_API_URLを書き換えてください。');
    }
    const history = await loadAll();
    renderAll(history);
  }catch(e){
    document.getElementById('mainContent').innerHTML =
      `<div class="error-box">⚠️ データの取得に失敗しました。<br>${e.message}<br><br>・GAS_API_URLが正しいか確認してください<br>・GASが正しくデプロイされているか確認してください（?type=pingで確認可能）</div>
       <div style="text-align:center"><button class="reload-btn" onclick="init()" style="margin-top:16px">再試行</button></div>`;
  }
}

/* ==================================================================
   みんなのメモ（解説の学生クラウドソーシング）検収キュー
   ・GASの ?type=notesAdmin&key=… で全投稿＋問題情報を取得（要・先生キー）
   ・先生キーはGASコード内の TEACHER_KEY と同じ合言葉。初回入力でブラウザに記憶
   ・承認するまで学生には公開されない
   ================================================================== */
const TEACHER_KEY_STORAGE = 'quizDashTeacherKey_v1';
const REJECT_TEMPLATES = ['事実誤り（解説と矛盾）','出典不明・確認できない','不適切な表現','翻訳で内容を確認できませんでした','その他'];

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getTeacherKey(){ try{ return localStorage.getItem(TEACHER_KEY_STORAGE) || ''; }catch(e){ return ''; } }
function setTeacherKey(k){ try{ localStorage.setItem(TEACHER_KEY_STORAGE, k); }catch(e){} }
function clearTeacherKey(){ try{ localStorage.removeItem(TEACHER_KEY_STORAGE); }catch(e){} }

let NOTES_ADMIN = null; // {notes:[…], questions:{qid:{question,subject,answerText,explanation}}}

function renderKeyPrompt(msg){
  document.getElementById('notesAdminArea').innerHTML = `
  <div class="section">
    <h2><span class="section-label">メモ</span>🌏 みんなのメモ 検収</h2>
    ${msg ? `<div class="error-box" style="margin-bottom:12px;">${escHtml(msg)}</div>` : ''}
    <p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:10px;">
      学生が投稿したメモの承認には<b>先生キー</b>（GASのコード内 TEACHER_KEY に設定した合言葉）が必要です。<br>
      初回に1度入力すると、このブラウザに記憶されます。
    </p>
    <div class="key-box">
      <input type="password" id="teacherKeyInput" placeholder="先生キーを入力">
      <button class="reload-btn" style="margin-top:0" onclick="saveTeacherKeyAndLoad()">保存して読み込む</button>
    </div>
  </div>`;
}

function saveTeacherKeyAndLoad(){
  const el = document.getElementById('teacherKeyInput');
  const v = el ? el.value.trim() : '';
  if(!v) return;
  setTeacherKey(v);
  initNotesAdmin();
}

function resetTeacherKey(){
  clearTeacherKey();
  renderKeyPrompt('');
}

async function initNotesAdmin(){
  const area = document.getElementById('notesAdminArea');
  const key = getTeacherKey();
  if(!key){ renderKeyPrompt(''); return; }
  area.innerHTML = '<div class="loading">みんなのメモを読み込み中…</div>';
  try{
    const res = await fetch(`${GAS_API_URL}?type=notesAdmin&key=${encodeURIComponent(key)}`);
    const data = await res.json();
    if(!data.ok){
      if(data.error === 'AUTH'){
        clearTeacherKey();
        renderKeyPrompt('先生キーが正しくありません。もう一度入力してください。');
        return;
      }
      throw new Error(data.message || data.error || '取得失敗');
    }
    NOTES_ADMIN = data;
    renderNotesAdmin();
  }catch(e){
    area.innerHTML = `<div class="section">
      <h2><span class="section-label">メモ</span>🌏 みんなのメモ 検収</h2>
      <div class="error-box">⚠️ みんなのメモの取得に失敗しました。<br>${escHtml(e.message)}<br><br>・GASを更新した後は「デプロイを管理」から新バージョンの発行が必要です（?type=pingで反映確認）</div>
      <div style="text-align:center"><button class="reload-btn" onclick="initNotesAdmin()">再試行</button></div>
    </div>`;
  }
}

function questionBoxHtml(n){
  const q = (NOTES_ADMIN.questions || {})[n.qid];
  const explHtml = q && q.explanation
    ? `<details class="mod-expl"><summary>💡 日本語解説を開く（矛盾がないか確認）</summary><div class="expl-body">${escHtml(q.explanation)}</div></details>`
    : `<div style="margin-top:6px;font-size:11.5px;color:var(--warn);">※この問題にはまだ日本語解説がありません</div>`;
  return `<div class="mod-q">
    <span class="qid">${escHtml(n.qid)}</span><span style="font-size:11.5px;color:var(--muted);">${escHtml(q ? q.subject : '')}</span><br>
    ${escHtml(q ? q.question : '（問題バンクに問題が見つかりません）')}<br>
    <span class="ans">正答：${escHtml(q ? q.answerText : '—')}</span>
    ${explHtml}
  </div>`;
}

function noteHeadHtml(n){
  return `<div class="mod-note-head">
    <span class="mod-lang">${escHtml(n.lang)}</span>
    <span class="mod-type">${escHtml(n.type)}</span>
    <span class="mod-who">✍ ${escHtml(n.name)}　${escHtml(String(n.date))}</span>
    ${n.reports > 0 ? `<span class="mod-report-flag">⚑ 通報${n.reports}件</span>` : ''}
  </div>`;
}

function pendingCardHtml(n){
  const rejectOpts = REJECT_TEMPLATES.map(t => `<option value="${escHtml(t)}">${escHtml(t)}</option>`).join('');
  return `<div class="mod-card${n.reports > 0 ? ' reported' : ''}" data-id="${escHtml(n.id)}">
    ${questionBoxHtml(n)}
    ${noteHeadHtml(n)}
    ${n.reason ? `<div style="font-size:11.5px;color:var(--warn);margin-bottom:6px;">⚠ ${escHtml(n.reason)}</div>` : ''}
    <div class="mod-body">${escHtml(n.body)}</div>
    ${n.lang !== '日本語' ? `<div class="mod-ja"><span class="lbl">🌐 自動日本語訳（承認判断用・学生には表示されません）</span>${escHtml(n.ja || '（訳を取得できませんでした）')}</div>` : ''}
    <div class="mod-actions">
      <button class="mod-btn approve" data-act="approve">✔ 承認して公開</button>
      <button class="mod-btn edit" data-act="toggleEdit">✎ 修正して承認</button>
      <button class="mod-btn reject" data-act="toggleReject">✕ 却下</button>
    </div>
    <div class="mod-edit-area">
      <p style="font-size:11.5px;color:var(--muted);margin-bottom:6px;">本文を修正してから公開します（外国語部分は無理に直さなくてOK）</p>
      <textarea class="mod-edit-text" maxlength="300">${escHtml(n.body)}</textarea>
      <div class="mod-actions"><button class="mod-btn approve" data-act="approveEdited">✔ この内容で承認して公開</button></div>
    </div>
    <div class="mod-reject-area">
      <div class="mod-actions">
        <select class="mod-reject-reason">${rejectOpts}</select>
        <button class="mod-btn reject" data-act="rejectConfirm">✕ この理由で却下</button>
      </div>
      <p style="font-size:11px;color:var(--muted);margin-top:6px;">却下理由は投稿した本人にだけ表示されます。</p>
    </div>
    <div class="mod-msg"></div>
  </div>`;
}

function approvedCardHtml(n){
  return `<div class="mod-card" data-id="${escHtml(n.id)}" style="padding:12px 14px;">
    ${noteHeadHtml(n)}
    <div style="font-size:11.5px;color:var(--muted);margin-bottom:4px;">問題：${escHtml(n.qid)}　公開日：${escHtml(String(n.approvedAt || ''))}</div>
    <div class="mod-body" style="font-size:13px;">${escHtml(n.body)}</div>
    ${n.ja ? `<div class="approved-note-ja">🌐 ${escHtml(n.ja)}</div>` : ''}
    <div class="mod-actions"><button class="mod-btn unpublish" data-act="unpublish">公開を取り消す（承認待ちに戻す）</button></div>
    <div class="mod-msg"></div>
  </div>`;
}

function renderNotesAdmin(){
  const notes = (NOTES_ADMIN && NOTES_ADMIN.notes) || [];
  const pending = notes.filter(n => n.status === 'pending')
    .sort((a,b) => (b.reports - a.reports) || String(a.date).localeCompare(String(b.date))); // 通報あり優先→古い順
  const approved = notes.filter(n => n.status === 'approved')
    .sort((a,b) => String(b.approvedAt || b.date).localeCompare(String(a.approvedAt || a.date)));
  const rejected = notes.filter(n => n.status === 'rejected').reverse().slice(0, 20);

  document.getElementById('notesAdminArea').innerHTML = `
  <div class="section">
    <h2><span class="section-label">メモ</span>🌏 みんなのメモ 検収${pending.length ? `<span class="pending-badge">承認待ち ${pending.length}件</span>` : ''}</h2>
    <p style="font-size:12.5px;color:var(--muted);line-height:1.7;margin-bottom:14px;">
      学生の投稿は<b>承認するまで誰にも公開されません</b>。原文の下の「自動日本語訳」を読み、日本語解説と矛盾しないか・不適切でないかを確認してください。訳だけで判断できないときは「翻訳で内容を確認できませんでした」で却下してOKです。
    </p>
    ${pending.length ? pending.map(pendingCardHtml).join('') : '<div class="empty">承認待ちの投稿はありません 🎉</div>'}
    <details style="margin-top:16px;">
      <summary style="cursor:pointer;font-size:13px;font-weight:700;color:var(--ink);">✅ 公開中のメモ（${approved.length}件）</summary>
      <div style="margin-top:10px;">${approved.length ? approved.map(approvedCardHtml).join('') : '<div class="empty">公開中のメモはまだありません</div>'}</div>
    </details>
    <details style="margin-top:10px;">
      <summary style="cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);">🗂 却下した投稿（直近${rejected.length}件）</summary>
      <div style="margin-top:10px;">${rejected.length ? rejected.map(n => `
        <div class="mod-card" style="padding:10px 14px;">
          ${noteHeadHtml(n)}
          <div class="mod-body" style="font-size:12.5px;">${escHtml(n.body)}</div>
          <div style="font-size:11.5px;color:var(--danger);margin-top:4px;">却下理由：${escHtml(n.reason || '—')}</div>
        </div>`).join('') : '<div class="empty">却下した投稿はありません</div>'}</div>
    </details>
    <div style="text-align:right;margin-top:14px;display:flex;gap:14px;justify-content:flex-end;">
      <button class="mini-link" onclick="initNotesAdmin()">↻ 再読み込み</button>
      <button class="mini-link" onclick="resetTeacherKey()">先生キーを入力し直す</button>
    </div>
  </div>`;
}

async function moderateNote(noteId, decision, newBody, reason, card){
  const msgEl = card.querySelector('.mod-msg');
  card.querySelectorAll('.mod-btn').forEach(b => b.disabled = true);
  try{
    const res = await fetch(GAS_API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'moderateNote', key: getTeacherKey(), noteId, decision, newBody, reason })
    });
    const data = await res.json();
    if(!data.ok){
      if(data.error === 'AUTH'){ clearTeacherKey(); renderKeyPrompt('先生キーが正しくありません。もう一度入力してください。'); return; }
      throw new Error(data.message || data.error || '更新に失敗しました');
    }
    // ローカルの状態を更新して再描画（毎回の再取得はしない。最新化は「再読み込み」で）
    const n = (NOTES_ADMIN.notes || []).find(x => x.id === noteId);
    if(n){
      if(decision === 'approve'){
        n.status = 'approved';
        n.approvedAt = new Date().toLocaleString('ja-JP');
        n.reports = 0;
        n.reason = '';
        if(newBody) n.body = newBody;
      } else if(decision === 'reject'){
        n.status = 'rejected';
        n.reason = reason || '';
      } else {
        n.status = 'pending';
        n.reason = reason || '';
      }
    }
    renderNotesAdmin();
  }catch(e){
    if(msgEl) msgEl.textContent = '⚠️ ' + e.message;
    card.querySelectorAll('.mod-btn').forEach(b => b.disabled = false);
  }
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.mod-btn');
  if(!btn) return;
  const card = btn.closest('.mod-card');
  if(!card) return;
  const id = card.dataset.id;
  const act = btn.dataset.act;
  if(act === 'approve'){ moderateNote(id, 'approve', '', '', card); }
  else if(act === 'toggleEdit'){
    const area = card.querySelector('.mod-edit-area');
    const rj = card.querySelector('.mod-reject-area');
    if(rj) rj.style.display = 'none';
    if(area) area.style.display = (area.style.display === 'block') ? 'none' : 'block';
  }
  else if(act === 'approveEdited'){
    const nb = card.querySelector('.mod-edit-text').value.trim();
    if(!nb) return;
    moderateNote(id, 'approve', nb, '', card);
  }
  else if(act === 'toggleReject'){
    const area = card.querySelector('.mod-reject-area');
    const ed = card.querySelector('.mod-edit-area');
    if(ed) ed.style.display = 'none';
    if(area) area.style.display = (area.style.display === 'block') ? 'none' : 'block';
  }
  else if(act === 'rejectConfirm'){
    const reason = card.querySelector('.mod-reject-reason').value;
    moderateNote(id, 'reject', '', reason, card);
  }
  else if(act === 'unpublish'){
    moderateNote(id, 'pending', '', '先生が公開を取り消しました（再確認待ち）', card);
  }
});

init();
initNotesAdmin();
</script>
</body>
</html>
